name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore signing key
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android.keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Build TWA APK
        run: |
          mkdir twa-build && cd twa-build
          cat > twa-manifest.json << 'EOF'
          ${{ secrets.TWA_MANIFEST }}
          EOF
          bubblewrap build \
            --manifest twa-manifest.json \
            --signingKeyPath ../android.keystore \
            --signingKeyAlias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --signingKeyPassword ${{ secrets.ANDROID_KEY_PASSWORD }} \
            --signingStorePassword ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Upload APK as release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Vego Beauty APK — Build ${{ github.run_number }}"
          body: "Automatic APK build from commit ${{ github.sha }}"
          files: twa-build/app-release-signed.apk
